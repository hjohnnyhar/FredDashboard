name: Refresh FRED Dashboard

on:
  schedule:
    # Runs daily at 8:00 AM UTC (after most FRED data updates)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python macro_dashboard_generator.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html
          git diff --cached --quiet || git commit -m "chore: refresh dashboard data $(date -u +'%Y-%m-%d')"
          git push
